name: cpeditor
base: core26
build-base: devel
grade: devel
confinement: classic
adopt-info: cpeditor

apps:
  cpeditor:
    common-id: cpeditor.desktop
    command: usr/bin/cpeditor

parts:
  cpeditor:
    parse-info:
      - usr/share/metainfo/cpeditor.appdata.xml
    plugin: cmake
    build-packages:
      - build-essential
      - qt6-base-dev
      - qt6-base-dev-tools
      - qt6-tools-dev
      - qt6-tools-dev-tools
      - qt6-l10n-tools
      - qt6-svg-dev
      - qt6-declarative-dev
      - libqt6core5compat6-dev
      - libgl1-mesa-dev
      - git
    stage-packages:
      - libqt6core6
      - libqt6gui6
      - libqt6widgets6
      - libqt6network6
      - libqt6svg6
      - libqt6core5compat6
    source: .
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
    override-build: |
      cd $CRAFT_PART_SRC
      cd third_party/extra-cmake-modules
      cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DBUILD_HTML_DOCS=OFF -DBUILD_MAN_DOCS=OFF -DBUILD_QTHELP_DOCS=OFF -DBUILD_TESTING=OFF
      cmake --build build --parallel $(nproc)
      DESTDIR=$CRAFT_PART_INSTALL cmake --install build
      cd -
      cd third_party/syntax-highlighting
      cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DBUILD_HTML_DOCS=OFF -DBUILD_MAN_DOCS=OFF -DBUILD_QTHELP_DOCS=OFF -DBUILD_TESTING=OFF
      cmake --build build --parallel $(nproc)
      DESTDIR=$CRAFT_PART_INSTALL cmake --install build
      cd -
      craftctl default
    override-prime: |
        craftctl default
        sed -i 's|Icon=.*|Icon=${SNAP}/usr/share/icons/hicolor/512x512/apps/cpeditor.png|g' $CRAFT_PRIME/usr/share/applications/cpeditor.desktop
