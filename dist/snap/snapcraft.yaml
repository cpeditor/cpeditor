name: cpeditor
base: core26
build-base: devel
grade: devel
confinement: classic
adopt-info: cpeditor

apps:
  cpeditor:
    common-id: cpeditor.desktop
    command: usr/bin/cpeditor

parts:
  cpeditor:
    parse-info:
      - usr/share/metainfo/cpeditor.appdata.xml
    plugin: cmake
    build-packages:
      - build-essential
      - extra-cmake-modules
      - libkf6syntaxhighlighting-dev
      - qt6-base-dev
      - qt6-base-dev-tools
      - qt6-tools-dev
      - qt6-tools-dev-tools
      - qt6-l10n-tools
      - qt6-svg-dev
      - qt6-declarative-dev
      - qt6-5compat-dev
      - libgl1-mesa-dev
      - git
      - perl
    stage-packages:
      - libqt6core6t64
      - libqt6gui6
      - libqt6widgets6
      - libqt6network6
      - libqt6svg6
      - libqt6core5compat6
      - libqt6qml6
      - libqt6quick6
      - libkf6syntaxhighlighting6
      - libicu78
    source: .
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
